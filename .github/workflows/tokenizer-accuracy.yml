name: Tokenizer Accuracy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test-accuracy:
    name: Test tokenizer accuracy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('scripts/test_all_tokenizers.py') }}
          restore-keys: hf-models-

      - name: Set up virtualenv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install tokenizers huggingface_hub

      - name: Build tokie Python package
        run: |
          source .venv/bin/activate
          pip install maturin
          cd crates/tokie-python && maturin develop --release

      - name: Download enwik8 test data
        run: |
          mkdir -p benches/data
          if [ ! -f benches/data/enwik8 ]; then
            curl -L "https://mattmahoney.net/dc/enwik8.zip" -o /tmp/enwik8.zip
            unzip -o /tmp/enwik8.zip -d benches/data/
          fi

      - name: Run tokenizer accuracy tests
        run: |
          source .venv/bin/activate
          python scripts/test_all_tokenizers.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tokenizer-test-results
          path: test_results.json
